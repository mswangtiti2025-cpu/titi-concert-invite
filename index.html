<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#fff1f6" />
<title>Titi 的演唱会邀请</title>
<style>
:root{--ink:#28222a;--muted:#8b7f88;--pink:#f35a99;--pink2:#ec4f91;--lav:#9b79c6;--shadow:0 18px 35px rgba(219,117,157,.17);--btn-shadow:0 8px 0 #c94682,0 18px 24px rgba(206,76,133,.24)}
*{box-sizing:border-box;font-family:"Microsoft YaHei","微软雅黑",sans-serif!important;font-weight:700!important}html,body{margin:0;height:100%;overflow:hidden;color:var(--ink)}body{background:radial-gradient(circle at 88% 12%,rgba(191,161,255,.34),transparent 26rem),radial-gradient(circle at 8% 86%,rgba(255,210,114,.22),transparent 20rem),linear-gradient(180deg,#fff3f6,#fff8f0)}button,input{font:inherit}button{-webkit-tap-highlight-color:transparent}.phone{position:relative;width:min(100vw,430px);height:100svh;min-height:680px;margin:0 auto;overflow:hidden;background:linear-gradient(90deg,rgba(255,255,255,.52) 1px,transparent 1px),linear-gradient(180deg,rgba(255,255,255,.58) 1px,transparent 1px),radial-gradient(circle at 72% 18%,rgba(226,193,255,.38),transparent 9rem),radial-gradient(circle at 18% 78%,rgba(255,232,177,.32),transparent 12rem),linear-gradient(180deg,#fff1f4,#fff9f1);background-size:44px 44px,44px 44px,auto,auto,auto;box-shadow:0 0 60px rgba(74,43,60,.12)}
.topbar{position:relative;z-index:5;display:grid;grid-template-columns:44px 1fr 44px;align-items:center;gap:8px;height:calc(58px + env(safe-area-inset-top));padding:env(safe-area-inset-top) 12px 0;background:rgba(245,245,245,.72);backdrop-filter:blur(16px)}.brand{text-align:center;line-height:1.15}.brand strong{display:block;font-size:16px}.brand span{display:block;margin-top:4px;color:rgba(55,45,55,.42);font-size:11px}.ghost{width:42px;height:42px;border:0;border-radius:16px;background:transparent;color:#302832;font-size:33px;line-height:1}.dots{font-size:19px;letter-spacing:1px}.music{position:absolute;z-index:8;top:calc(86px + env(safe-area-inset-top));right:18px;width:48px;height:48px;border:0;border-radius:50%;color:#15bd78;background:rgba(255,255,255,.86);box-shadow:0 8px 22px rgba(91,61,83,.13)}
.stage{position:relative;z-index:2;height:calc(100% - 58px - env(safe-area-inset-top))}.screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;width:100%;min-height:100%;padding:72px 26px 36px;overflow-y:auto;scrollbar-width:none;opacity:0;transform:translateX(18px);animation:in .34s ease forwards}.screen::-webkit-scrollbar{display:none}.center{align-items:center;text-align:center}.final{justify-content:flex-start;padding-top:76px}@keyframes in{to{opacity:1;transform:translateX(0)}}
.heart{position:absolute;top:62px;left:23px;width:56px;height:50px;display:grid;place-items:center;color:#b74278;filter:drop-shadow(0 8px 8px rgba(205,77,128,.2))}.heart:before{content:"";position:absolute;inset:3px 4px 8px;background:#f85a9b;clip-path:polygon(50% 88%,14% 52%,6% 36%,6% 20%,18% 8%,34% 8%,50% 22%,66% 8%,82% 8%,94% 20%,94% 36%,86% 52%);box-shadow:inset -7px -8px 0 rgba(165,45,112,.22),inset 7px 7px 0 rgba(255,182,210,.7)}.heart span{position:relative;z-index:1;margin-top:-3px;font-size:14px}.eyebrow{margin:0 0 22px;color:var(--lav);font-size:12px;letter-spacing:.34em;text-transform:uppercase}h1{margin:0;max-width:100%;font-size:clamp(31px,9vw,42px);line-height:1.28}h1 span{color:var(--pink)}.copy{max-width:340px;margin:20px 0 0;color:var(--muted);font-size:16px;line-height:1.85}.hint{min-height:28px;margin:18px 0 0;color:#9b8f98;font-size:14px;line-height:1.7}
.float{position:absolute;z-index:1;pointer-events:none;color:rgba(240,88,151,.55);font-size:25px;animation:floaty 4.8s ease-in-out infinite}.f1{top:17%;left:10%;color:rgba(255,198,44,.75)}.f2{top:39%;right:9%}.f3{top:20%;right:-2%;width:55px;height:48px;display:grid;place-items:center;border-radius:22px 0 0 22px;background:rgba(255,255,255,.82);color:#17bd76}.f4{bottom:23%;left:8%;color:rgba(255,198,44,.75)}.f5{bottom:12%;right:12%}@keyframes floaty{50%{transform:translateY(-12px) rotate(5deg)}}
.ticket{position:relative;width:136px;height:112px;margin:34px auto 46px;border:8px solid #ff8db7;border-left-style:dotted;border-radius:24px;background:linear-gradient(135deg,#fff7cd,#fff0f4);box-shadow:0 15px 0 #db5d91,var(--shadow);transform:rotate(-1deg)}.ticket:before{content:"";position:absolute;top:20px;right:14px;width:72px;height:9px;border-radius:999px;background:#ffd3df}.ticket:after{content:"♥";position:absolute;inset:0;display:grid;place-items:center;color:#f15494;font-size:64px;text-shadow:0 8px 0 rgba(203,64,126,.2)}.cloud{position:relative;width:132px;height:132px;display:grid;place-items:center;margin:34px auto 46px;border-radius:30px;background:#ffe1ef;box-shadow:0 9px 0 #e59ac1,var(--shadow);color:#a271df;font-size:76px}.cloud:before{content:"☁"}.cloud i{position:absolute;bottom:-16px;width:13px;height:28px;border-radius:999px;background:#a271df}.cloud i:nth-child(1){left:43px}.cloud i:nth-child(2){left:61px}.cloud i:nth-child(3){left:79px}
.primary,.secondary{min-width:min(285px,100%);min-height:62px;border:0;border-radius:28px;padding:0 28px;font-size:22px;line-height:1}.primary{color:#fff;background:linear-gradient(180deg,#f765a5,var(--pink2));box-shadow:var(--btn-shadow)}.secondary{color:#736971;background:linear-gradient(180deg,#fffaf6,#eee9e3);box-shadow:0 8px 0 #d7d0ca,0 14px 24px rgba(110,89,99,.12)}.primary:active,.secondary:active{transform:translateY(5px)}.row{display:flex;width:100%;max-width:360px;gap:16px;margin-top:40px}.row button{min-width:0;width:calc(50% - 8px);font-size:19px}.inputwrap{width:100%;max-width:340px;margin:28px 0 0}.inputwrap input{width:100%;height:66px;border:2px solid rgba(219,116,160,.22);border-radius:22px;padding:0 20px;color:var(--ink);background:rgba(255,255,255,.82);box-shadow:var(--shadow);outline:0}.inputwrap input:focus{border-color:var(--pink)}
.card,.seat,.invite{width:100%;border:1px solid rgba(255,255,255,.9);border-radius:28px;background:rgba(255,255,255,.86);box-shadow:var(--shadow);backdrop-filter:blur(12px)}.card{display:grid;gap:14px;margin:28px 0 38px;padding:22px}.card div,dl div{display:flex;align-items:center;justify-content:space-between;gap:16px;min-height:42px;border-bottom:1px dashed rgba(218,143,174,.25)}.card div:last-child,dl div:last-child{border-bottom:0}.card span,dt{flex:0 0 auto;color:var(--muted);font-size:14px}.card strong,dd{margin:0;text-align:right;font-size:16px}.seat{position:relative;max-width:330px;margin:34px 0 46px;padding:30px 24px;text-align:center;overflow:hidden}.seat:before,.seat:after{content:"";position:absolute;top:78px;width:30px;height:30px;border-radius:50%;background:#fff2f5}.seat:before{left:-15px}.seat:after{right:-15px}.seat .head{margin:0 auto 20px;color:#a17cc8;font-size:12px;letter-spacing:.22em}.seat strong{display:block;color:var(--pink);font-size:37px;line-height:1.15}.seat p{margin:12px 0 0;font-size:25px}.seat small{display:block;margin-top:18px;color:var(--muted);font-size:14px;line-height:1.6}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;width:100%;margin:28px 0 12px}.option{position:relative;min-height:122px;border:2px solid transparent;border-radius:24px;padding:18px 10px 16px;color:#4e4550;background:rgba(255,255,255,.82);box-shadow:0 12px 26px rgba(218,119,158,.12)}.option span{display:block;min-height:42px;margin-bottom:12px;font-size:34px;line-height:1}.option strong{display:block;font-size:16px;line-height:1.35}.option.selected{border-color:var(--pink);background:rgba(255,237,246,.9)}.option.warn{border-color:#ffb800;background:rgba(255,247,218,.88)}.option.selected:after{content:"✓";position:absolute;top:11px;right:12px;width:30px;height:30px;display:grid;place-items:center;border-radius:50%;color:#fff;background:var(--pink);font-size:18px}.wide{grid-column:1/-1;display:flex;align-items:center;justify-content:flex-start;gap:18px;min-height:88px;padding:18px 64px 18px 22px;text-align:left}.wide span{display:grid;place-items:center;flex:0 0 50px;min-height:50px;margin:0;border-radius:18px;color:#fff;background:var(--pink)}
.invite{margin:26px 0 22px;padding:22px}.inviteTop{display:flex;justify-content:space-between;gap:16px;padding-bottom:16px;border-bottom:1px dashed rgba(199,90,138,.28)}.inviteTop em{color:var(--pink);font-style:normal}.inviteTitle{margin:18px 0;color:var(--pink);font-size:24px;line-height:1.25}dl{display:grid;gap:10px;margin:0}.status{margin:18px 0 0;border-radius:18px;padding:14px;color:#7d3b60;background:rgba(255,225,239,.75);font-size:14px;line-height:1.65}.progress{position:absolute;z-index:6;left:28px;right:28px;bottom:calc(18px + env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(8,1fr);gap:5px}.progress span{height:4px;border-radius:999px;background:rgba(255,255,255,.72)}.progress span.active{background:var(--pink)}.toast{position:fixed;z-index:50;left:50%;bottom:calc(74px + env(safe-area-inset-bottom));width:min(340px,calc(100vw - 44px));padding:14px 18px;border-radius:18px;color:#fff;background:rgba(51,41,53,.88);box-shadow:0 14px 34px rgba(55,42,55,.22);text-align:center;transform:translate(-50%,20px);opacity:0;pointer-events:none;transition:.22s}.toast.show{opacity:1;transform:translate(-50%,0)}.pop{position:fixed;z-index:60;pointer-events:none;color:var(--pink);font-size:18px;animation:pop .78s ease forwards}@keyframes pop{to{opacity:0;transform:translate(var(--x),-78px) scale(1.8) rotate(18deg)}}
@media(max-height:735px){.phone{min-height:100svh}.screen{padding-top:58px;padding-bottom:30px}.heart{top:48px}h1{font-size:clamp(28px,8vw,36px)}.ticket,.cloud{margin-top:22px;margin-bottom:34px}.copy{margin-top:14px;font-size:15px}.option{min-height:104px}.primary,.secondary{min-height:56px}}@media(max-width:360px){.screen{padding-left:18px;padding-right:18px}.row{gap:10px}.row button{font-size:17px}.option strong{font-size:14px}}
</style>
</head>
<body>
<main class="phone" aria-live="polite">
<span class="float f1">✦</span><span class="float f2">♡</span><span class="float f3">♪</span><span class="float f4">✧</span><span class="float f5">♥</span>
<header class="topbar"><button class="ghost" id="back" aria-label="返回上一页">×</button><div class="brand"><strong>有人给你准备了一个 Moment</strong><span>titi.invite.dev</span></div><button class="ghost dots" aria-label="更多">•••</button></header>
<button class="music" id="music" aria-label="音乐开关">♪</button><audio id="bgm" loop preload="none" src="./assets/bgm.mp3"></audio>
<section class="stage" id="stage"></section><div class="progress" id="progress" aria-hidden="true"></div>
</main><div class="toast" id="toast"></div>
<template id="intro"><article class="screen center"><div class="heart"><span>1</span></div><p class="eyebrow">A LITTLE CONCERT THING</p><h1>小狗送信！<br><span>一封神秘邀请函</span></h1><div class="ticket"></div><button class="primary" data-next>继续 <span>→</span></button></article></template>
<template id="name"><article class="screen center"><div class="heart"><span>2</span></div><p class="eyebrow">IDENTITY CHECK</p><h1>请确认你的<br><span>专属称呼。</span></h1><p class="copy">Jeffrey一开始是我的哥哥，后来也是我的哥哥！</p><label class="inputwrap"><input id="nameInput" autocomplete="off" aria-label="请输入 jeffrey 或 哥哥"></label><p class="hint" id="nameHint"></p><button class="primary" id="verify">验证身份 <span>→</span></button></article></template>
<template id="ask"><article class="screen center"><div class="heart"><span>3</span></div><div class="cloud"><i></i><i></i><i></i></div><h1>可以一起去看<br><span>单依纯演唱会嘛？！</span></h1><div class="row"><button class="primary" data-next>愿意 ♥</button><button class="secondary" id="pretend">我再装一下</button></div><p class="hint" id="pretendHint"></p></article></template>
<template id="info"><article class="screen"><div class="heart"><span>4</span></div><p class="eyebrow">THE DATE PLAN</p><h1>本次约会内容</h1><div class="card"><div><span>演出</span><strong>单依纯演唱会</strong></div><div><span>时间</span><strong>2026.07.17 19:30</strong></div><div><span>地点</span><strong>梅赛德斯-奔驰文化中心</strong></div><div><span>嘉宾</span><strong>Titi & <span data-guest>哥哥</span></strong></div></div><button class="primary" data-next>看看座位 <span>→</span></button></article></template>
<template id="seat"><article class="screen center"><div class="heart"><span>5</span></div><p class="eyebrow">TWO TICKETS READY</p><h1>座位已经<br><span>锁定成功。</span></h1><div class="seat"><div class="head">CONCERT TICKET</div><strong>内场南5区</strong><p>4排 3座 & 4座</p><small>OMG~这都被你发现我们抢到原价内场票了~</small></div><button class="primary" data-next>下一步 <span>→</span></button></article></template>
<template id="outfit"><article class="screen"><div class="heart"><span>6</span></div><h1>明天穿什么<br><span>比较合适？</span></h1><div class="grid" id="outfitOptions"><button class="option" data-value="蛋岛紫"><span>🖤</span><strong>蛋岛紫</strong></button><button class="option" data-value="温柔白"><span>🤍</span><strong>温柔白</strong></button><button class="option" data-value="随便但好看"><span>✨</span><strong>随便但好看</strong></button><button class="option" data-value="演唱会战袍"><span>🎤</span><strong>演唱会战袍</strong></button><button class="option" data-value="黑白星星配色"><span>★</span><strong>黑白星星配色</strong></button><button class="option" data-value="自定义zzz"><span>✅</span><strong>自定义zzz</strong></button></div><p class="hint" id="outfitHint"></p><button class="primary" id="outfitNext">选好了 <span>→</span></button></article></template>
<template id="departure"><article class="screen"><div class="heart"><span>7</span></div><h1>我们怎么<br><span>出发？</span></h1><div class="grid" id="departOptions"><button class="option" data-value="各自出发"><span>🚶</span><strong>各自出发</strong></button><button class="option" data-value="场馆门口见"><span>📍</span><strong>场馆门口见</strong></button><button class="option" data-value="地铁站集合"><span>🚇</span><strong>地铁站集合</strong></button><button class="option" data-value="提前一点见"><span>🕖</span><strong>提前一点见</strong></button><button class="option wide" data-value="不好意思，我们俩要一起出发"><span>♥</span><strong>不好意思，我们俩要一起出发。</strong></button></div><p class="hint" id="departHint"></p><button class="primary" id="departNext">好的 <span>→</span></button></article></template>
<template id="final"><article class="screen final"><div class="heart"><span>8</span></div><p class="eyebrow">INVITATION GENERATED</p><h1>演唱会<br><span>约会邀请函</span></h1><div class="invite"><div class="inviteTop"><span>TO：<strong data-guest>哥哥</strong></span><em>From Titi</em></div><div class="inviteTitle">一起去看单依纯演唱会</div><dl><div><dt>时间</dt><dd>2026年7月17日 19:30</dd></div><div><dt>地点</dt><dd>梅赛德斯-奔驰文化中心</dd></div><div><dt>座位</dt><dd>内场南5区 4排3座 & 4座</dd></div><div><dt>穿搭</dt><dd data-outfit>待选择</dd></div><div><dt>出发</dt><dd data-departure>待选择</dd></div><div><dt>BGM</dt><dd>爱的回归线</dd></div></dl><p class="status">状态：两张票已准备好，只等你出现。</p></div><button class="primary" id="save">我会准时出现 ♥</button></article></template>
<script>
const screens=["intro","name","ask","info","seat","outfit","departure","final"];const state={index:0,guest:"哥哥",pretendCount:0,outfit:"",departure:""};const stage=document.querySelector("#stage"),progress=document.querySelector("#progress"),toast=document.querySelector("#toast"),back=document.querySelector("#back"),music=document.querySelector("#music"),bgm=document.querySelector("#bgm");let toastTimer=0;function showToast(m){clearTimeout(toastTimer);toast.textContent=m;toast.classList.add("show");toastTimer=setTimeout(()=>toast.classList.remove("show"),2100)}function pop(t){const r=t.getBoundingClientRect(),h=document.createElement("span");h.className="pop";h.textContent="♥";h.style.left=r.left+r.width/2+"px";h.style.top=r.top+r.height/2+"px";h.style.setProperty("--x",Math.round(Math.random()*90-45)+"px");document.body.appendChild(h);setTimeout(()=>h.remove(),850)}function renderProgress(){progress.innerHTML=screens.map((_,i)=>`<span class="${i<=state.index?"active":""}"></span>`).join("")}function applyState(){document.querySelectorAll("[data-guest]").forEach(n=>n.textContent=state.guest);document.querySelectorAll("[data-outfit]").forEach(n=>n.textContent=state.outfit||"待选择");document.querySelectorAll("[data-departure]").forEach(n=>n.textContent=state.departure||"待选择")}function render(){const name=screens[state.index],tpl=document.getElementById(name);stage.replaceChildren(tpl.content.cloneNode(true));back.style.visibility=state.index===0?"hidden":"visible";renderProgress();applyState();bind(name)}function next(){if(state.index<screens.length-1){state.index++;render()}}function prev(){if(state.index>0){state.index--;render()}}function select(container,card){container.querySelectorAll(".option").forEach(i=>i.classList.remove("selected","warn"));card.classList.add("selected")}function bind(name){stage.querySelectorAll("[data-next]").forEach(b=>b.addEventListener("click",()=>{pop(b);next()}));if(name==="name"){const input=document.getElementById("nameInput"),hint=document.getElementById("nameHint"),verify=document.getElementById("verify");verify.addEventListener("click",()=>{const v=input.value.trim();if(v.toLowerCase()==="jeffrey"){state.guest="Jeffrey";hint.textContent="验证通过：这就是 Titi 要邀请的人。";pop(verify);setTimeout(next,320);return}if(v==="哥哥"){state.guest="哥哥";hint.textContent="验证通过：哥哥已进入邀请名单。";pop(verify);setTimeout(next,320);return}hint.textContent="只可以输入 jeffrey 或 哥哥。";showToast("系统不认识这个帅哥。");input.focus()});input.addEventListener("keydown",e=>{if(e.key==="Enter")verify.click()})}if(name==="ask"){const p=document.getElementById("pretend"),h=document.getElementById("pretendHint"),msgs=["装一下可以，但不能太久。","系统建议：直接答应。","Titi 已经看见你在偷笑了。","好吧，按钮决定自己改名。"];p.addEventListener("click",()=>{state.pretendCount++;h.textContent=msgs[Math.min(state.pretendCount-1,msgs.length-1)];pop(p);if(state.pretendCount>=3){p.textContent="好吧我愿意 ♥";p.className="primary";p.onclick=next}})}if(name==="outfit"){const c=document.getElementById("outfitOptions"),h=document.getElementById("outfitHint"),n=document.getElementById("outfitNext"),titi="黑白星星配色";c.querySelectorAll(".option").forEach(card=>card.addEventListener("click",()=>{state.outfit=card.dataset.value;select(c,card);pop(card);if(state.outfit!==titi){card.classList.add("warn");h.textContent="哎呀Titi今天不想穿这个！";showToast("已记录你的选择，但 Titi 有一点点意见。")}else{h.textContent="这套可以，Titi 今天想穿这个。";showToast("穿搭已记录。")}}));n.addEventListener("click",()=>{if(!state.outfit){showToast("先选一个穿搭。");return}pop(n);next()})}if(name==="departure"){const c=document.getElementById("departOptions"),h=document.getElementById("departHint"),n=document.getElementById("departNext"),titi="不好意思，我们俩要一起出发";c.querySelectorAll(".option").forEach(card=>card.addEventListener("click",()=>{state.departure=card.dataset.value;select(c,card);pop(card);if(state.departure!==titi){card.classList.add("warn");h.textContent="哎呀 Titi 今天不想这样出发！";showToast("已记录你的选择，但 Titi 可能会重新商量。")}else{h.textContent="一起出发，快乐加倍。";showToast("出发方式已记录。")}}));n.addEventListener("click",()=>{if(!state.departure){showToast("先选一个出发方式。");return}pop(n);next()})}if(name==="final"){document.getElementById("save").addEventListener("click",e=>{pop(e.currentTarget);showToast("收到。Titi 的邀请状态：已被认真接住。")})}}back.addEventListener("click",prev);music.addEventListener("click",async()=>{try{if(bgm.paused){await bgm.play();showToast("正在尝试播放：爱的回归线")}else{bgm.pause();showToast("音乐已暂停。")}}catch{showToast("还没有音源，先保留这个音乐开关。")}});render();
</script>
</body>
</html>
